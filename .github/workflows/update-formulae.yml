name: Update Formulae

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

jobs:
  update:
    name: Update formulae from releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Regenerate formulae
        env:
          GH_TOKEN: ${{ github.token }}
        run: bin/update-formulae

      - name: Commit changes
        run: |
          if git diff --quiet -- Formula; then
            echo "Formulae are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula
          git commit -m "chore: update formulae"
          git push
